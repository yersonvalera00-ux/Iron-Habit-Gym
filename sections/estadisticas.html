<!-- ----------------------------------------------------------------
     VISTA E: REPORTES Y ESTADÍSTICAS (GRÁFICAS EN SVG)
     Fragmento cargado de forma asíncrona por dashboard.js (fetch)
     ---------------------------------------------------------------- -->
<div id="tab-estadisticas" class="dashboard-tab-content">

  <div class="chart-container-row">

    <!-- Gráfica A: Ingresos Recaudados (SVG Dinámico) -->
    <div class="chart-box">
      <h3 class="chart-title"><i class="ti ti-cash"></i> Reporte de Ingresos Totales</h3>
      <svg class="svg-chart" id="svg-chart-income" viewBox="0 0 400 200">
        <line x1="50" y1="30" x2="380" y2="30" stroke="#e2e8f0" stroke-width="1"></line>
        <line x1="50" y1="80" x2="380" y2="80" stroke="#e2e8f0" stroke-width="1"></line>
        <line x1="50" y1="130" x2="380" y2="130" stroke="#e2e8f0" stroke-width="1"></line>
        <line x1="50" y1="170" x2="380" y2="170" stroke="#94a3b8" stroke-width="1.5"></line>

        <text x="15" y="35" font-size="10" fill="#64748b" font-family="sans-serif">$1M+</text>
        <text x="15" y="85" font-size="10" fill="#64748b" font-family="sans-serif">$500k</text>
        <text x="15" y="135" font-size="10" fill="#64748b" font-family="sans-serif">$100k</text>
        <text x="15" y="175" font-size="10" fill="#64748b" font-family="sans-serif">$0</text>

        <g id="chart-bars-income-container">
          <!-- Barras se inyectan aquí -->
        </g>
      </svg>
      <div style="display:flex; justify-content:space-around; width:100%; margin-top:10px; font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">
        <span>Mes Anterior</span>
        <span>Mes Actual</span>
      </div>
    </div>

    <!-- Gráfica B: Asistencia Semanal (SVG Dinámico) -->
    <div class="chart-box">
      <h3 class="chart-title"><i class="ti ti-calendar-event"></i> Análisis de Afluencia Semanal</h3>
      <svg class="svg-chart" id="svg-chart-attendance" viewBox="0 0 400 200">
        <line x1="50" y1="30" x2="380" y2="30" stroke="#e2e8f0" stroke-width="1"></line>
        <line x1="50" y1="100" x2="380" y2="100" stroke="#e2e8f0" stroke-width="1"></line>
        <line x1="50" y1="170" x2="380" y2="170" stroke="#94a3b8" stroke-width="1.5"></line>

        <text x="20" y="35" font-size="10" fill="#64748b" font-family="sans-serif">Alta</text>
        <text x="20" y="105" font-size="10" fill="#64748b" font-family="sans-serif">Media</text>
        <text x="20" y="175" font-size="10" fill="#64748b" font-family="sans-serif">Baja</text>

        <path id="chart-line-attendance-path" d="M 80 150 Q 150 50, 220 120 T 360 80" fill="none" stroke="var(--accent)" stroke-width="3"></path>

        <circle cx="80" cy="150" r="5" fill="var(--accent)"></circle>
        <circle cx="150" cy="70" r="5" fill="var(--accent)"></circle>
        <circle cx="220" cy="120" r="5" fill="var(--accent)"></circle>
        <circle cx="290" cy="140" r="5" fill="var(--accent)"></circle>
        <circle cx="360" cy="80" r="5" fill="var(--accent)"></circle>

        <text x="70" y="190" font-size="10" fill="#64748b" font-family="sans-serif">Lun</text>
        <text x="140" y="190" font-size="10" fill="#64748b" font-family="sans-serif">Mie</text>
        <text x="210" y="190" font-size="10" fill="#64748b" font-family="sans-serif">Vie</text>
        <text x="280" y="190" font-size="10" fill="#64748b" font-family="sans-serif">Sab</text>
        <text x="350" y="190" font-size="10" fill="#64748b" font-family="sans-serif">Dom</text>
      </svg>
    </div>

  </div>

</div>
